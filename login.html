<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Touba Fall - Connexion</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        max-width: 400px;
        width: 100%;
      }
      .login-header {
        background: #000;
        color: white;
        padding: 2rem;
        text-align: center;
      }
      .login-header .logo {
        font-size: 3rem;
        margin-bottom: 0.5rem;
      }
      .login-header .title {
        font-size: 1.5rem;
        font-weight: 300;
        margin-bottom: 0.25rem;
      }
      .login-header .subtitle {
        font-size: 0.9rem;
        opacity: 0.8;
      }
      .login-body {
        padding: 2rem;
      }
      .form-floating {
        margin-bottom: 1rem;
      }
      .btn-login {
        background: #000;
        border: none;
        padding: 0.75rem 2rem;
        border-radius: 10px;
        font-weight: 600;
        width: 100%;
        transition: all 0.3s ease;
      }
      .btn-login:hover {
        background: #333;
        transform: translateY(-2px);
      }
      .alert {
        border-radius: 10px;
        border: none;
      }
      .alert-error {
        background: #fee;
        color: #c0392b;
      }
      .alert-success {
        background: #efe;
        color: #27ae60;
      }
      .footer {
        text-align: center;
        padding: 1rem;
        color: #666;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <div class="logo">◆</div>
          <div class="title">TOUBA FALL</div>
          <div class="subtitle">Gestion Hebdomadaire · Sénégal</div>
        </div>
        <div class="login-body">
          {% with messages = get_flashed_messages(with_categories=true) %} {% if
          messages %} {% for category, message in messages %}
          <div
            class="alert alert-{{ 'error' if category == 'error' else 'success' }} mb-3"
          >
            <i
              class="fas fa-{{ 'exclamation-triangle' if category == 'error' else 'check-circle' }}"
            ></i>
            {{ message }}
          </div>
          {% endfor %} {% endif %} {% endwith %}

          <form method="POST">
            <div class="form-floating">
              <input
                type="text"
                class="form-control"
                id="username"
                name="username"
                placeholder="Identifiant"
                required
              />
              <label for="username"
                ><i class="fas fa-user me-2"></i>Identifiant</label
              >
            </div>
            <div class="form-floating">
              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                placeholder="Mot de passe"
                required
              />
              <label for="password"
                ><i class="fas fa-lock me-2"></i>Mot de passe</label
              >
            </div>
            <button type="submit" class="btn btn-primary btn-login">
              <i class="fas fa-sign-in-alt me-2"></i>SE CONNECTER
            </button>
          </form>
        </div>
      </div>
    </div>

    <div class="footer">© 2025 — Touba Fall (Sécurisé)</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
